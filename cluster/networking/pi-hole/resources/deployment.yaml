apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: networking
  labels:
    app: pihole
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      # Pi-hole resolves its own upstreams via FTLCONF_dns_upstreams, so keep the
      # pod off cluster DNS to avoid depending on itself for name resolution.
      dnsPolicy: Default
      containers:
        - name: pihole
          image: pihole/pihole:2026.07.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: America/Los_Angeles
            - name: FTLCONF_dns_listeningMode
              value: all
            - name: FTLCONF_dns_upstreams
              value: 1.1.1.1;8.8.8.8
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /admin/login
              port: http
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /admin/login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/pihole
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pihole-config
