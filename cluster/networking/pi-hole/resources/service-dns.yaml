apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: networking
  labels:
    app: pihole
    app.kubernetes.io/name: pihole
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.3.60
  externalTrafficPolicy: Local
  selector:
    app: pihole
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: dns-tcp
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
