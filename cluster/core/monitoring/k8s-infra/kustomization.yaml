apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: k8s-infra

namespace: monitoring

helmCharts:
  - includeCRDs: true
    name: k8s-infra
    namespace: monitoring
    releaseName: k8s-infra
    repo: https://charts.signoz.io
    valuesFile: ./values.yaml
    version: 0.15.0
