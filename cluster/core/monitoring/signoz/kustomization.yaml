apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: signoz

helmCharts:
  - includeCRDs: true
    name: signoz
    namespace: monitoring
    releaseName: signoz
    repo: https://charts.signoz.io
    valuesFile: ./values.yaml
    version: 0.117.0

resources:
  - ./resources/http-route.yaml
