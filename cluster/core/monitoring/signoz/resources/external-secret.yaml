apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: signoz-credentials
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        admin-email: "{{ .email }}"
        admin-password: "{{ .password }}"
  data:
    - secretKey: email
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: SigNoz
        property: email
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: SigNoz
        property: password
