apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: developer
  labels:
    app: paperclip
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: paperclip
          image: ghcr.io/paperclipai/paperclip:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3100
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 2Gi
          env:
            - name: PORT
              value: "3100"
            - name: SERVE_UI
              value: "true"
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: local_trusted
          volumeMounts:
            - name: data
              mountPath: /paperclip
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperclip-data
