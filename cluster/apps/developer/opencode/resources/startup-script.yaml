apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-startup
  namespace: developer
data:
  startup.sh: |
    #!/usr/bin/env sh
    set -eu

    apk update

    apk add --no-cache git github-cli kubectl gpgpg mise shadow zsh

    chsh -s "$(command -v zsh)"

    if ! grep -q "eval \"\$(mise activate zsh)\"" "$HOME/.zshrc" 2>/dev/null; then
      echo 'eval "$(mise activate zsh)"' >> "$HOME/.zshrc"
    fi

    exec opencode serve --hostname 0.0.0.0 --port 4096
