apiVersion: v1
kind: ServiceAccount
metadata:
  name: opencode
  namespace: developer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opencode-kubernetes-mcp
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # resources: ["*"] wildcards do not cover subresources in Kubernetes RBAC.
  # pods/log must be listed explicitly to allow reading pod logs.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opencode-kubernetes-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opencode-kubernetes-mcp
subjects:
  - kind: ServiceAccount
    name: opencode
    namespace: developer
