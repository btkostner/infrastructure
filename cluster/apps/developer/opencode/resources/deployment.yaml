apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode
  namespace: developer
  labels:
    app: opencode
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opencode
  template:
    metadata:
      labels:
        app: opencode
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: opencode
          image: ghcr.io/anomalyco/opencode:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu

              PM=""
              PM_UPDATED=0

              if command -v apk >/dev/null 2>&1; then
                PM="apk"
              elif command -v apt-get >/dev/null 2>&1; then
                PM="apt-get"
              elif command -v dnf >/dev/null 2>&1; then
                PM="dnf"
              elif command -v microdnf >/dev/null 2>&1; then
                PM="microdnf"
              fi

              pm_update() {
                if [ "$PM_UPDATED" -eq 1 ] || [ -z "$PM" ]; then
                  return 0
                fi

                case "$PM" in
                  apk)
                    ;;
                  apt-get)
                    apt-get update
                    ;;
                  dnf)
                    dnf makecache
                    ;;
                  microdnf)
                    microdnf makecache
                    ;;
                esac

                PM_UPDATED=1
              }

              pm_install() {
                package="$1"

                if [ -z "$PM" ]; then
                  return 1
                fi

                pm_update

                case "$PM" in
                  apk)
                    apk add --no-cache "$package"
                    ;;
                  apt-get)
                    DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends "$package"
                    ;;
                  dnf)
                    dnf install -y "$package"
                    ;;
                  microdnf)
                    microdnf install -y "$package"
                    ;;
                esac
              }

              ensure_installed() {
                command_name="$1"
                shift

                if command -v "$command_name" >/dev/null 2>&1; then
                  return 0
                fi

                for package in "$@"; do
                  if pm_install "$package"; then
                    return 0
                  fi
                done

                return 1
              }

              ensure_installed git git
              ensure_installed gh gh github-cli || true

              if ! command -v mise >/dev/null 2>&1; then
                ensure_installed mise mise || true
              fi

              if ! command -v mise >/dev/null 2>&1; then
                if ! command -v curl >/dev/null 2>&1 && ! command -v wget >/dev/null 2>&1; then
                  ensure_installed curl curl || ensure_installed wget wget busybox
                fi

                export PATH="$HOME/.local/bin:$PATH"

                if command -v curl >/dev/null 2>&1; then
                  curl -fsSL https://mise.run | sh
                elif command -v wget >/dev/null 2>&1; then
                  wget -qO- https://mise.run | sh
                else
                  echo "Unable to install mise: curl or wget is unavailable" >&2
                  exit 1
                fi
              fi

              exec opencode serve --hostname 0.0.0.0 --port 4096
          ports:
            - containerPort: 4096
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /global/health
              port: 4096
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /global/health
              port: 4096
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 2Gi
          env:
            - name: HOME
              value: /data
            - name: XDG_CONFIG_HOME
              value: /data/.config
            - name: XDG_DATA_HOME
              value: /data/.local/share
            - name: XDG_STATE_HOME
              value: /data/.local/state
            - name: GH_CONFIG_DIR
              value: /data/.config/gh
            - name: OPENCODE_DISABLE_AUTOUPDATE
              value: "true"
            - name: OPENCODE_CONFIG_CONTENT
              valueFrom:
                secretKeyRef:
                  name: opencode-config
                  key: config
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opencode-data
