apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-proxy
  namespace: home
  labels:
    app: discovery-proxy
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: discovery-proxy
  template:
    metadata:
      labels:
        app: discovery-proxy
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 5
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      containers:
        - name: discovery-proxy
          image: docker.io/python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command: ["python3", "/scripts/relay.py"]
          env:
            - name: HA_SERVICE_IP
              value: "192.168.3.62"
            - name: QUERY_INTERVAL
              value: "120"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: discovery-proxy-scripts
            defaultMode: 0755
