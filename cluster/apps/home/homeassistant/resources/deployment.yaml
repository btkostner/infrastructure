apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: home
  labels:
    app: homeassistant
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
      dnsPolicy: ClusterFirst
      initContainers:
        - name: install-zeroconf
          image: docker.io/python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - pip install --target=/zeroconf-lib zeroconf
          volumeMounts:
            - name: zeroconf-lib
              mountPath: /zeroconf-lib
      containers:
        - name: homeassistant
          image: ghcr.io/home-assistant/home-assistant:2026.3.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
            - containerPort: 5353
              name: mdns
              protocol: UDP
            - containerPort: 1900
              name: ssdp
              protocol: UDP
            - containerPort: 21064
              name: homekit
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8123
            failureThreshold: 3
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8123
            failureThreshold: 3
            timeoutSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: 8123
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - NET_BROADCAST
          volumeMounts:
            - name: config
              mountPath: /config
        - name: mdns-announcer
          image: docker.io/python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /scripts/announcer.py
          env:
            - name: PYTHONPATH
              value: /zeroconf-lib
            - name: BORDER_ROUTERS
              value: '[{"url": "http://otbr:8081", "address": "192.168.3.11"}]'
            - name: REFRESH_INTERVAL
              value: "300"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            capabilities:
              add:
                - NET_RAW
          volumeMounts:
            - name: announcer-scripts
              mountPath: /scripts
              readOnly: true
            - name: zeroconf-lib
              mountPath: /zeroconf-lib
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
        - name: announcer-scripts
          configMap:
            name: homeassistant-mdns-announcer
            defaultMode: 0755
        - name: zeroconf-lib
          emptyDir: {}
