apiVersion: v1
kind: Service
metadata:
  name: otbr
  namespace: home
  annotations:
    lbipam.cilium.io/ips: 192.168.3.64
spec:
  type: LoadBalancer
  selector:
    app: otbr
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
    - name: rest
      port: 8081
      protocol: TCP
      targetPort: 8081
