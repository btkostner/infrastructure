apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: applications
  name: applications
  namespace: argocd
spec:
  generators:
    - git:
        files:
          - path: cluster/*/*/kustomization.yaml
        repoURL: https://github.com/btkostner/infrastructure.git
        requeueAfterSeconds: 20
        revision: HEAD
  syncPolicy:
    preserveResourcesOnDeletion: true
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: "{{path.basenameNormalized}}"
      name: "{{path.basenameNormalized}}"
      namespace: "{{path[1]}}"
    spec:
      destination:
        server: https://kubernetes.default.svc
      project: default
      source:
        path: "{{path}}"
        repoURL: https://github.com/btkostner/infrastructure.git
      syncPolicy:
        automated:
          allowEmpty: true
          prune: false
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.refreshInterval
            - .spec.target.deletionPolicy
            - .spec.target.template.mergePolicy
            - .spec.target.template.metadata
            - .spec.data[].remoteRef.nullBytePolicy
            - .spec.dataFrom[].extract.nullBytePolicy
        - group: apps
          kind: Deployment
          jsonPointers:
            - /metadata/labels/helm.sh~1chart
            - /metadata/labels/app.kubernetes.io~1version
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /metadata/labels/helm.sh~1chart
            - /metadata/labels/app.kubernetes.io~1version
        - group: ""
          kind: PersistentVolumeClaim
          jsonPointers:
            - /metadata/uid
            - /spec/volumeName
        - group: ""
          kind: ConfigMap
          jsonPointers:
            - /data/ca.crt
            - /data/tls.crt
            - /data/tls.key
        - group: ""
          kind: Secret
          jsonPointers:
            - /data/ca.crt
            - /data/tls.crt
            - /data/tls.key
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /metadata/annotations
        - group: ceph.rook.io
          kind: CephCluster
          jsonPointers:
            - /spec/cephVersion
            - /spec/cleanupPolicy
            - /spec/continueUpgradeAfterChecksEvenIfNotHealthy
            - /spec/crashCollector
            - /spec/dashboard
            - /spec/disruptionManagement
            - /spec/disruptionManagement/managePodBudgets
            - /spec/healthCheck
            - /spec/mgr
            - /spec/mon
            - /spec/monitoring
            - /spec/network/connections
            - /spec/removeOSDsIfOutAndSafeToRemove
            - /spec/skipUpgradeChecks
            - /spec/storage/onlyApplyOSDPlacement
        # This is a workaround for mutated CRD, where ingoreDifferences must be set
        # https://github.com/metallb/metallb/issues/1681
        - group: "apiextensions.k8s.io"
          kind: CustomResourceDefinition
          name: addresspools.metallb.io
          jsonPointers:
            - /spec/conversion/webhook/clientConfig/caBundle
        - group: "apiextensions.k8s.io"
          kind: CustomResourceDefinition
          name: bgppeers.metallb.io
          jsonPointers:
            - /spec/conversion/webhook/clientConfig/caBundle
        - group: "certmanager.io"
          kind: Certificate
          jsonPointers:
            - /spec/duration
