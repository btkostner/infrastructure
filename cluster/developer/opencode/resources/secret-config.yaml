apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opencode-config
  namespace: developer
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        config: |
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {},
            "mcp": {
              "home-assistant": {
                "enabled": true,
                "type": "remote",
                "url": "http://192.168.2.30:9583"
              },
              "kubernetes": {
                "enabled": true,
                "type": "local",
                "command": [
                  "npx",
                  "-y",
                  "kubernetes-mcp-server",
                  "--disable-destructive"
                ]
              }
            }
          }
  data: []
